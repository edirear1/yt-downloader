<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* TikTok-inspired Dark Theme */
        body {
            background-color: #121212;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-container {
            background-color: #1c1c1e;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #2c2c2e;
        }

        /* Neon Green Headings */
        h1 {
            color: #00df89;
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            color: #a1a1a6;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .highlight {
            color: #ffffff;
            font-weight: bold;
        }

        /* QR Code Styling */
        .qr-section {
            margin: 30px 0;
        }

        .qr-image {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            border: 3px solid #00df89;
            padding: 5px;
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 223, 137, 0.3);
        }

        .qr-label {
            display: block;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #00df89;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Neon Green Action Buttons */
        .btn {
            display: inline-block;
            background-color: #00df89;
            color: #121212;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 223, 137, 0.4);
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: #00ff9d;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 223, 137, 0.6);
        }

        /* Back Button Link */
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #a1a1a6;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #00df89;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <!-- Heading -->
        <h1>Get in Touch</h1>
        
        <!-- Partnership & Business Info -->
        <p>For business inquiries, partnerships, or support, feel free to reach out to us. We would love to collaborate with you!</p>
        
        <!-- Email Button -->
        <a href="mailto:edirear46@gmail.com" class="btn">Email Us</a>

        <!-- WhatsApp QR Code Section -->
        <div class="qr-section">
            <img src="qr.png" alt="WhatsApp QR Code" class="qr-image">
            <span class="qr-label">Scan to WhatsApp</span>
        </div>

        <hr style="border: 0; border-top: 1px solid #2c2c2e; margin: 20px 0;">

        <!-- Back Navigation Link -->
        <a href="https://tinyurl.com/Utube-downloader" class="back-link">← back</a>
    </div>

</body>
</html>
